<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VisualLLm — Pipeline Debug</title>
<style>
  :root{
    --bg:#0c0f14; --panel:#141a22; --panel2:#1b232e; --edge:#26303c;
    --ink:#e7edf3; --dim:#8a97a6; --faint:#5b6675;
    --green:#34d399; --yellow:#fbbf24; --red:#f87171; --off:#586273; --blue:#60a5fa;
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,'Liberation Mono',monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#10161f,var(--bg));
       color:var(--ink);font-family:var(--mono);font-size:14px;line-height:1.5;}
  .wrap{max-width:980px;margin:0 auto;padding:22px 20px 60px;}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  header h1{font-size:15px;font-weight:600;letter-spacing:.5px;margin:0;color:var(--ink);}
  header .sub{color:var(--dim);font-size:12px;}
  .live{margin-left:auto;display:flex;align-items:center;gap:7px;color:var(--dim);font-size:12px;}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--green);
             box-shadow:0 0 10px var(--green);animation:pulse 1.6s infinite;}
  .live.off .dot{background:var(--red);box-shadow:0 0 10px var(--red);animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---- flow strip ---- */
  .flow{display:flex;align-items:flex-start;gap:0;background:var(--panel);
        border:1px solid var(--edge);border-radius:12px;padding:20px 14px 16px;overflow-x:auto;}
  .node{display:flex;flex-direction:column;align-items:center;min-width:104px;flex:1;}
  .box{position:relative;width:62px;height:46px;border-radius:10px;border:1.5px solid var(--edge);
       background:var(--panel2);display:flex;align-items:center;justify-content:center;}
  .box .led{width:16px;height:16px;border-radius:50%;background:var(--off);transition:.25s;}
  .box.green{border-color:var(--green)} .box.green .led{background:var(--green);box-shadow:0 0 14px var(--green);}
  .box.yellow{border-color:var(--yellow)} .box.yellow .led{background:var(--yellow);box-shadow:0 0 10px var(--yellow);}
  .box.red{border-color:var(--red);animation:flash 1s infinite} .box.red .led{background:var(--red);box-shadow:0 0 16px var(--red);}
  .box.off .led{background:var(--off)}
  @keyframes flash{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.5)}50%{box-shadow:0 0 0 5px rgba(248,113,113,0)}}
  .node .lbl{margin-top:9px;font-size:12px;font-weight:600;letter-spacing:.4px;}
  .node .sub{font-size:10.5px;color:var(--dim);}
  .node .lat{font-size:11px;margin-top:3px;color:var(--blue);min-height:15px;}
  .node .lat.bad{color:var(--red)}
  .arrow{align-self:center;margin-top:14px;color:var(--faint);font-size:18px;flex:0 0 18px;}
  .legend{margin:10px 2px 0;color:var(--dim);font-size:11px;display:flex;gap:16px;}
  .legend i{font-style:normal;display:inline-flex;align-items:center;gap:6px;}
  .legend .d{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .grid{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;margin-top:14px;}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--edge);border-radius:12px;padding:14px 16px;}
  .card h2{margin:0 0 10px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);font-weight:600;}
  .card.av.green{border-color:rgba(52,211,153,.5)}
  .card.av.yellow{border-color:rgba(251,191,36,.45)}
  .card.av.red{border-color:rgba(248,113,113,.6)}

  .kv{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #1f2731;}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--dim)} .kv .v{font-weight:600}
  .kv .ok{color:var(--green)} .kv .over{color:var(--red)}
  .pill{padding:1px 8px;border-radius:999px;font-size:11px;font-weight:600;}
  .pill.green{background:rgba(52,211,153,.15);color:var(--green)}
  .pill.yellow{background:rgba(251,191,36,.15);color:var(--yellow)}
  .pill.red{background:rgba(248,113,113,.16);color:var(--red)}
  .pill.off{background:rgba(88,98,115,.2);color:var(--off)}
  .reason{margin-top:10px;font-size:12px;color:var(--ink);background:#10161e;border-left:3px solid var(--edge);
          padding:7px 10px;border-radius:0 6px 6px 0;min-height:16px;}
  .reason.red{border-left-color:var(--red);color:#ffd7d7}
  .reason.green{border-left-color:var(--green)}
  .reason.yellow{border-left-color:var(--yellow)}

  .ttfo .big{font-size:30px;font-weight:700;letter-spacing:.5px;}
  .ttfo .ok{color:var(--green)} .ttfo .over{color:var(--red)}
  .ttfo .row{display:flex;gap:18px;align-items:baseline;color:var(--dim);font-size:12px;margin-top:6px;flex-wrap:wrap;}
  .ttfo .row b{color:var(--ink)}

  .turns .trow{display:flex;align-items:center;gap:10px;font-size:12px;padding:4px 0;border-bottom:1px dashed #1f2731;}
  .turns .trow:last-child{border-bottom:0}
  .turns .id{color:var(--dim);width:34px}
  .turns .tt{width:54px;font-weight:600}
  .turns .tt.over{color:var(--red)} .turns .tt.ok{color:var(--green)}
  .bar{display:flex;height:9px;border-radius:5px;overflow:hidden;flex:1;background:#10161e;}
  .bar span{display:block;height:100%}
  .seg-stt{background:#5eead4}.seg-llm{background:#60a5fa}.seg-tts{background:#c084fc}.seg-avatar{background:#fbbf24}

  .log{font-size:11.5px;max-height:190px;overflow:auto;}
  .log .e{padding:2px 0;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .log .e .ts{color:var(--faint);margin-right:8px}
  .log .e.error{color:#ffb4b4}.log .e.warn{color:#ffe08a}.log .e.info{color:#bcd3ea}
  .empty{color:var(--faint);font-size:12px;padding:6px 0;}

  .logs-card{grid-column:1 / -1;}
  .logtabs{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .logtabs button{font-family:var(--mono);font-size:11px;padding:4px 13px;border-radius:6px;
    border:1px solid var(--edge);background:var(--panel2);color:var(--dim);cursor:pointer;}
  .logtabs button.active{border-color:var(--blue);color:var(--ink);background:#1a2430;}
  .logtabs .auto{margin-left:auto;display:flex;align-items:center;gap:6px;color:var(--faint);font-size:11px;}
  .logview{font-size:11px;background:#080b10;border:1px solid var(--edge);border-radius:8px;
    padding:10px 12px;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-word;
    color:#b3c0cd;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>VisualLLm — Pipeline Debug</h1>
    <span class="sub" id="meta"></span>
    <div class="live off" id="live"><span class="dot"></span><span id="liveTxt">connecting…</span></div>
  </header>

  <div class="flow" id="flow"></div>
  <div class="legend">
    <i><span class="d" style="background:var(--green)"></span>active</i>
    <i><span class="d" style="background:var(--yellow)"></span>idle</i>
    <i><span class="d" style="background:var(--red)"></span>error / stalled</i>
    <i><span class="d" style="background:var(--off)"></span>off</i>
  </div>

  <div class="grid">
    <div class="card av" id="avCard">
      <h2>Avatar (Ditto)</h2>
      <div id="avBody"></div>
    </div>

    <div class="card ttfo">
      <h2>Time to first output</h2>
      <div id="ttfoBody"></div>
    </div>

    <div class="card turns">
      <h2>Recent turns</h2>
      <div id="turnsBody"></div>
    </div>

    <div class="card">
      <h2>Live log</h2>
      <div class="log" id="logBody"></div>
    </div>

    <div class="card logs-card">
      <h2>Process logs</h2>
      <div class="logtabs">
        <button id="lt-pipeline" class="active" onclick="selectLog('pipeline')">pipeline.log</button>
        <button id="lt-ditto" onclick="selectLog('ditto')">ditto.log</button>
        <label class="auto"><input type="checkbox" id="logAuto" checked> auto-refresh</label>
      </div>
      <pre class="logview" id="logView">loading…</pre>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const cls = (s) => (s === 'green'||s==='yellow'||s==='red'||s==='off') ? s : 'off';
const arrow = '→';

function renderFlow(stages){
  const el = $('flow'); el.innerHTML = '';
  stages.forEach((s, i) => {
    const node = document.createElement('div'); node.className = 'node';
    const latTxt = s.latency_ms == null ? '' : (s.latency_ms >= 1000
        ? (s.latency_ms/1000).toFixed(1)+'s' : s.latency_ms+'ms');
    const latBad = s.state === 'red' ? ' bad' : '';
    node.innerHTML = `
      <div class="box ${cls(s.state)}" title="${s.reason||''}"><span class="led"></span></div>
      <div class="lbl">${s.label}</div>
      <div class="sub">${s.sub}</div>
      <div class="lat${latBad}">${latTxt}</div>`;
    el.appendChild(node);
    if (i < stages.length - 1){
      const a = document.createElement('div'); a.className = 'arrow'; a.textContent = arrow;
      el.appendChild(a);
    }
  });
}

function kv(k, v){ return `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`; }
function yn(b){ return b ? 'yes' : 'no'; }

function renderAvatar(a){
  $('avCard').className = 'card av ' + cls(a.state);
  if (a.state === 'off'){
    $('avBody').innerHTML = `<div class="reason">${a.reason||'audio-only'}</div>`;
    return;
  }
  const gpu = a.gpu_ok == null ? '—' : (a.gpu_ok ? 'yes ✓' : 'NO ✗ (CPU)');
  const fps = `${a.fps} / ${a.fps_target}`;
  const syncPill = a.sync === 'SYNCED'
      ? '<span class="pill green">SYNCED</span>'
      : '<span class="pill red">FALLBACK</span>';
  // hubert feature-extraction time (the diffusion runs in a worker thread, untimed;
  // gpu% below is the real headroom signal for tuning DITTO_OVERLAP / DITTO_STEPS).
  let feat = '—';
  if (a.feat_max_ms != null && a.feat_budget_ms != null) {
    const tight = a.feat_max_ms > a.feat_budget_ms * 0.85;
    feat = `<span class="${tight?'over':'ok'}">${a.feat_avg_ms}/${a.feat_max_ms}ms</span>`
         + ` <span class="k">of ${a.feat_budget_ms}ms</span>`;
  }
  let gpuLine = '—';
  if (a.gpu_util != null) {
    const hot = a.gpu_util >= 92;  // little headroom left -> can't push overlap/steps up
    gpuLine = `<span class="${hot?'over':'ok'}">${a.gpu_util}%</span>`
            + (a.vram_used!=null ? ` <span class="k">${(a.vram_used/1024).toFixed(1)}G`
               + (a.gpu_temp!=null?` ${a.gpu_temp}C`:'') + `</span>` : '');
  }
  $('avBody').innerHTML =
      kv('server', a.reachable ? '<span class="pill green">reachable</span>'
                               : '<span class="pill red">unreachable</span>')
    + kv('GPU (onnx CUDA)', gpu)
    + kv('GPU util', gpuLine)
    + kv('hubert avg/max', feat)
    + kv('render fps', fps)
    + kv('real fps (rendered)', (() => {
        if (a.real_fps == null) return '—';
        const behind = a.speaking && a.real_fps < a.fps_target * 0.8;
        return `<span class="${behind?'over':'ok'}">${a.real_fps}</span>`
             + ` <span class="k">/ ${a.fps_target}` + (behind?' BEHIND':'') + `</span>`;
      })())
    + kv('queue (peak)', a.queue + ' (' + (a.q_peak!=null?a.q_peak:'?') + ') frm')
    + kv('speaking', yn(a.speaking))
    + kv('workers', a.workers_stopped ? '<span class="pill red">crashed</span>' : 'ok')
    + kv('sync', syncPill + ` <span class="k">lead ${a.lead_s}s</span>`)
    + `<div class="reason ${cls(a.state)}">${a.reason||''}</div>`;
}

function renderTtfo(t){
  if (!t || !t.count){ $('ttfoBody').innerHTML = '<div class="empty">no turns yet — speak to the avatar</div>'; return; }
  const pass = t.pass;
  $('ttfoBody').innerHTML =
      `<div class="big ${pass?'ok':'over'}">${t.last_s.toFixed(1)}s</div>`
    + `<div class="row">`
    + `<span>p95 <b class="${pass?'ok':'over'}">${t.p95_s.toFixed(1)}s</b> ${pass?'✓':'✗'}</span>`
    + `<span>median <b>${t.median_s.toFixed(1)}s</b></span>`
    + `<span>target <b>${t.target_s.toFixed(0)}s</b></span>`
    + `<span>turns <b>${t.count}</b></span>`
    + `</div>`;
}

function renderTurns(turns){
  if (!turns || !turns.length){ $('turnsBody').innerHTML = '<div class="empty">—</div>'; return; }
  const max = Math.max(...turns.map(t => t.ttfo), 1);
  $('turnsBody').innerHTML = turns.map(t => {
    const bd = t.breakdown || {};
    const seg = (k) => bd[k]!=null ? `<span class="seg-${k}" style="width:${(bd[k]/max*100)}%" title="${k} ${bd[k]}s"></span>` : '';
    return `<div class="trow">
       <span class="id">#${t.id}</span>
       <span class="tt ${t.over?'over':'ok'}">${t.ttfo.toFixed(1)}s</span>
       <span class="bar">${seg('stt')}${seg('llm')}${seg('tts')}${seg('avatar')}</span>
       ${t.over?'<span class="pill red">OVER</span>':''}
     </div>`;
  }).join('');
}

function renderLog(events){
  if (!events || !events.length){ $('logBody').innerHTML = '<div class="empty">no events</div>'; return; }
  $('logBody').innerHTML = events.map(e =>
    `<div class="e ${e.level}"><span class="ts">${e.t}</span>${e.msg}</div>`).join('');
}

function render(s){
  $('meta').textContent = `lang ${s.lang} · turn ${s.turn} · up ${s.uptime_s}s`;
  renderFlow(s.stages);
  renderAvatar(s.avatar);
  renderTtfo(s.ttfo);
  renderTurns(s.turns);
  renderLog(s.events);
}

// ---- process log viewer (tails logs/<name>.log via /logs/<name>) ----
let curLog = 'pipeline';
async function loadLog(){
  try{
    const r = await fetch(`/logs/${curLog}?lines=300`);
    const txt = await r.text();
    const el = $('logView');
    const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
    el.textContent = txt || '(empty)';
    if (atBottom) el.scrollTop = el.scrollHeight;  // follow the tail unless scrolled up
  }catch(e){ $('logView').textContent = '(failed to load log: ' + e + ')'; }
}
function selectLog(name){
  curLog = name;
  $('lt-pipeline').classList.toggle('active', name === 'pipeline');
  $('lt-ditto').classList.toggle('active', name === 'ditto');
  loadLog();
}
setInterval(() => { if ($('logAuto').checked) loadLog(); }, 3000);
loadLog();

let ws;
function connect(){
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { $('live').className = 'live'; $('liveTxt').textContent = 'LIVE'; };
  ws.onmessage = (ev) => { try { render(JSON.parse(ev.data)); } catch(e){} };
  ws.onclose = () => { $('live').className = 'live off'; $('liveTxt').textContent = 'disconnected'; setTimeout(connect, 1000); };
  ws.onerror = () => { try{ ws.close(); }catch(e){} };
}
connect();
</script>
</body>
</html>
