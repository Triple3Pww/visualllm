<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VisualLLm — Talking Avatar</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #1b2030, #0a0c12 60%);
    color: #e8eaf0; display: flex; align-items: center; justify-content: center;
  }
  #card { width: min(94vw, 560px); }
  #stage { position: relative; width: 100%; aspect-ratio: 1/1;
    border-radius: 24px; overflow: hidden; background: #14171f;
    box-shadow: 0 20px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.04); }
  video { width: 100%; height: 100%; object-fit: cover; background: #14171f;
    opacity: 0; transition: opacity .5s; }
  video.live { opacity: 1; }

  /* Loading / status overlay */
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px; text-align: center;
    padding: 28px; transition: opacity .45s; }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #title { font-size: 1.3rem; font-weight: 650; letter-spacing: .2px; }
  #sub { font-size: .95rem; color: #9aa2b6; max-width: 340px; line-height: 1.5; }
  button { font-size: 1.05rem; font-weight: 650; padding: 15px 34px; border: 0;
    border-radius: 14px; background: linear-gradient(180deg,#6b97ff,#4f7dff); color: #fff;
    cursor: pointer; box-shadow: 0 8px 20px rgba(79,125,255,.35); transition: transform .1s; }
  button:active { transform: translateY(1px); }

  /* Status pill bottom-center */
  #pill { position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
    padding: 9px 18px; border-radius: 999px; font-size: .9rem; font-weight: 650;
    background: rgba(10,12,18,.6); backdrop-filter: blur(8px); display: none;
    align-items: center; gap: 8px; }
  #pill.show { display: inline-flex; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ffd166; }
  .dot.ready { background: #3ddc84; box-shadow: 0 0 10px #3ddc84; }
  #err { margin-top: 14px; font-size: .8rem; color: #ff9a9a; white-space: pre-wrap;
    text-align: center; display: none; }
</style>
</head>
<body>
  <div id="card">
    <div id="stage">
      <video id="avatar" autoplay playsinline></video>

      <div id="overlay">
        <div id="title">Talking Avatar</div>
        <div id="sub">Press connect, then please wait — the avatar takes a few seconds to load. When its face appears, you can talk.</div>
        <button id="startBtn">Connect</button>
      </div>

      <div id="pill"><span class="dot" id="dot"></span><span id="pillText"></span></div>
    </div>
    <div id="err"></div>
  </div>

<script type="module">
import { PipecatClient } from "https://esm.sh/@pipecat-ai/client-js@1?bundle";
import { SmallWebRTCTransport } from "https://esm.sh/@pipecat-ai/small-webrtc-transport@1?bundle";

const $ = (id) => document.getElementById(id);
const overlay=$("overlay"), title=$("title"), sub=$("sub"),
      startBtn=$("startBtn"), pill=$("pill"), dot=$("dot"), pillText=$("pillText"),
      err=$("err"), avatar=$("avatar");

const remoteStream = new MediaStream();
avatar.srcObject = remoteStream;

function showError(m){ err.style.display="block"; err.textContent=String(m); console.error(m); }
function setPill(t, ready){ pill.classList.add("show"); pillText.textContent=t; dot.className="dot"+(ready?" ready":""); }

startBtn.addEventListener("click", start);

async function start(){
  startBtn.style.display="none";
  title.textContent="Connecting…";
  sub.textContent="Loading the avatar. This takes ~10–15 seconds on first connect. The face will appear when it's ready.";
  setPill("Connecting…", false);

  try{
    const transport = new SmallWebRTCTransport({ connectionUrl: "/api/offer" });
    const client = new PipecatClient({ transport, enableMic: true, enableCam: false });

    client.on("error", (e)=> showError("Error: "+(e?.message||JSON.stringify(e))));
    client.on("disconnected", ()=>{ overlay.classList.remove("hidden"); avatar.classList.remove("live");
      title.textContent="Disconnected"; sub.textContent="Reload the page to reconnect.";
      setPill("Disconnected", false); });

    // The avatar's VIDEO track only arrives once it's actually ready -> reveal.
    client.on("trackStarted", (track, participant)=>{
      if(participant && participant.local) return;       // ignore our own mic
      remoteStream.addTrack(track);
      if(track.kind==="video"){
        overlay.classList.add("hidden");
        avatar.classList.add("live");
        setPill("Waiting for message…", true);
      }
    });

    await client.connect();
  }catch(e){
    startBtn.style.display="inline-block";
    title.textContent="Couldn't connect"; showError(e?.stack||e?.message||e);
  }
}
</script>
</body>
</html>
